<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SMO Tutorials</title>
    <link rel="stylesheet" href="tutorials-style.css">
    <link rel="icon" type="image/x-icon" href="pls-set.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h1 id="title" class="center">SMO Tutorial Centre</h1>
    <h2 id="totalTutorials" class="center subtitle">Total tutorials: X</h2>
    <br>

    <div id="category-guides">
        <div id="category-guides-dropdown" class="center subtitle dropdown">
            <h2 class="center subtitle">Full Guides</h2>
            <i class="fa-solid fa-angle-up" id="category-guides-arrow"></i>
        </div>
        <div class="container center" id="category-guides-videos">

        </div>
    </div>

    <br>

    <div id="tricks">
        <div id="tricks-dropdown" class="center subtitle dropdown">
            <h2 class="center subtitle">Tricks and Strats</h2>
            <i class="fa-solid fa-angle-down" id="tricks-arrow"></i>
        </div>
        <div id="tricks-videos">

        </div>
    </div>

    <br>

    <div id="movement">
        <div id="movement-dropdown" class="center subtitle dropdown">
            <h2 class="center subtitle">Movement</h2>
            <i class="fa-solid fa-angle-down" id="movement-arrow"></i>
        </div>
        <div class="container center" id="movement-videos">

        </div>
    </div>

    <br>
    
    <div id="misc">
        <div id="misc-dropdown" class="center subtitle dropdown">
            <h2 class="center subtitle">Misc</h2>
            <i class="fa-solid fa-angle-down" id="misc-arrow"></i>
        </div>
        <div class="container center" id="misc-videos">

        </div>
    </div>

    <script src="tutorials.js"></script>
</body>
</html>
