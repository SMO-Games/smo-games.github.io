<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Guess the SMO Runner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="icon.png">
</head>
<body>

    <dialog id="gameOverDialogue">
        <div class="wrapper">
            <h1>Results (temp)</h1>
            <button id="copyResultsBtn" onclick=copyResults()>Copy</button>
            <button type="button" id="exitDialogue" onclick=exitGameOverDialogue()>Exit</button>
        </div>
    </dialog>

    <p class="center" id="runnerList">placeholder</p>

    <p id="errorMessage" class="center infoParagraphs"></p>
    <p id="guessCounter" class="center infoParagraphs">Make a guess!</p>

    <div class="center" id="runnerInput">
        <input id="runnerInputBox" autocomplete="off" type="text">
        <button type="submit" id="runnerSubmit">Submit</button>
    </div>

    <br><br>

    <br id="preRunners">
    
    <script src="index.js"></script>
</body>
</html>
