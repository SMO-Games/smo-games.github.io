<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SMO Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="homepage_icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <img src="smo_games_logo.png" alt="SMO Games" class="mainLogo">
    <div id="title" class="center">
        <h1><mark>SMO Games</mark></h1>
        <h3><mark>Made by <a href="https://twitch.tv/tryxdc">tryxdc</a></mark></h3>
    </div>

    <br>

    <div id="gameList" class="center">
        <div id="guessTheRunnerBox">
            <a href="/guess-the-runner/"><img src="/guess-the-runner/guessthesmorunner.png" alt="Guess the SMO Runner" id="guessTheRunnerLogo"></a>
            <h2 onclick="location.href='/guess-the-runner/'"><mark>Guess the SMO Runner </mark></h2>
        </div>

        <div id="higherOrLowerBox">
            <a href="/higher-or-lower/"><img src="higher_or_lower_logo.png" alt="Higher or Lower" id="higherOrLowerLogo" class="gameLogo"></a>
            <h2 onclick="location.href='/higher-or-lower/'"><mark>Higher or Lower</mark></h2>
        </div>

        <div id="trickjumpGeneratorBox">
            <a href="/trickjump-generator/"><img src="trickjump_generator_logo.png" alt="Trickjump Generator" id="trickjumpGeneratorLogo" class="gameLogo"></a>
            <h2 onclick="location.href='/trickjump-generator/'"><mark>Trickjump Generator</mark></h2>
        </div>
        
    </div>


    <dialog id="xDialogue">
        <div class="xWrapper wrapper">
        </div>
    </dialog>


    <script src="homepage.js"></script>
</body>
</html>
